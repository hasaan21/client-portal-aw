{% extends "base.html" %}
{% block title %}New client — {{ app_name }}{% endblock %}

{% block content %}
<section class="page-header">
  <div>
    <h1>New client</h1>
    <p class="muted">Static info that rarely changes. You'll add accounts, liabilities, and deductibles next.</p>
  </div>
  <a href="{{ url_for('clients.index') }}" class="btn btn-ghost">Cancel</a>
</section>

<form method="post" novalidate class="card stack">
  {% include "clients/_form.html" %}

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">Create client</button>
    <a href="{{ url_for('clients.index') }}" class="btn btn-ghost">Cancel</a>
  </div>
</form>
{% endblock %}
